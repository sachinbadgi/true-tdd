# truetdd.cfg
# ─────────────────────────────────────────────────────────────────
# Configuration for the truetdd post-commit reliability gate.
# Copy this to your project root (truetdd-init does this automatically).
# ─────────────────────────────────────────────────────────────────

# Path to your Product Requirements Document (Markdown with REQ-IDs)
AUTOTEST_PRD="prd.md"

# Source directory to measure coverage against
AUTOTEST_SRC="src"

# Path to the traceability store written by the pytest plugin
AUTOTEST_STORE="traceability_store.json"

# Path to the Graphify structural graph (leave empty if not using Graphify)
AUTOTEST_GRAPH="graphify-out/graph.json"

# Minimum reliability score (%) to trigger a WARNING (not a block)
AUTOTEST_THRESHOLD="80"

# Set to 0 to disable the truetdd gate without removing the hook
AUTOTEST_ENABLED="1"

# Path to the testdata.yaml sidecar file for data-aware mutation testing
AUTOTEST_TESTDATA="tests/testdata.yaml"

# Set to 0 to disable test data injection during mutmut runs
AUTOTEST_INJECT="1"
