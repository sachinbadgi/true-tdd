# autotest.cfg
# ─────────────────────────────────────────────────────────────────
# Configuration for the autotest post-commit reliability gate.
# This file is read by .git/hooks/post-commit when autotest hooks
# are installed. Copy this to your project root and edit values.
# ─────────────────────────────────────────────────────────────────

# Path to your Product Requirements Document (Markdown with REQ-IDs)
AUTOTEST_PRD="example/prd.md"

# Source directory to measure coverage against
AUTOTEST_SRC="src"

# Path to the traceability store written by the pytest plugin
AUTOTEST_STORE="example/traceability_store.json"

# Path to the Graphify structural graph
AUTOTEST_GRAPH="example/graphify-out/graph.json"

# Minimum reliability score (%) to trigger a WARNING (not a block)
AUTOTEST_THRESHOLD="80"

# Set to 0 to disable the autotest gate without removing the hook
AUTOTEST_ENABLED="1"
